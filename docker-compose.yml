version: '3.8'

services:
  addon:
    build: .
    container_name: torrents-br-addon
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - JACKETT_URL=http://204.216.132.119:9117
      - JACKETT_API_KEY=xk0n30nw3vsydqj40klwwqw1jjw227om
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - torrents-br

  redis:
    image: redis:7-alpine
    container_name: torrents-br-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - torrents-br

volumes:
  redis-data:

networks:
  torrents-br:
