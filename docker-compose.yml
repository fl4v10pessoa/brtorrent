version: '3.8'

services:
  addon:
    image: node:20-alpine
    container_name: torrents-br-addon
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache git &&
        git clone https://github.com/fl4v10pessoa/brtorrent.git /app &&
        npm ci --only=production &&
        node index.js
      "
    ports:
      - "3000:3000"
    environment:
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=xk0n30nw3vsydqj40klwwqw1jjw227om
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - torrents-br
      - jackett_default

  redis:
    image: redis:7-alpine
    container_name: torrents-br-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - torrents-br

volumes:
  redis-data:

networks:
  torrents-br:
  jackett_default:
    external: true
